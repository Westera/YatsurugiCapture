# Check for outdated dependencies and security vulnerabilities
name: Dependency Check

on:
  schedule:
    # Run every Monday at 10 AM UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pip-audit

    - name: Check for outdated packages
      run: |
        echo "=== Outdated Packages ==="
        pip list --outdated
        echo ""
        echo "=== Checking for security vulnerabilities ==="
        pip-audit --desc --fix-dry-run || true

    - name: Create issue if vulnerabilities found
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🔒 Security vulnerabilities detected in dependencies',
            body: 'Automated security scan found vulnerabilities. Please review and update dependencies.\n\nCheck the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
            labels: ['security', 'dependencies', 'automated']
          });
          console.log('Created issue:', issue.data.html_url);
