name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y v4l-utils portaudio19-dev python3-dev inkscape

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Generate icons
      run: |
        chmod +x scripts/create_icons.sh
        cd scripts && ./create_icons.sh

    - name: Build application
      run: |
        pyinstaller YatsurugiCapture.spec

    - name: Create release package
      run: |
        cd dist
        tar -czf YatsurugiCapture-linux-x64.tar.gz YatsurugiCapture
        sha256sum YatsurugiCapture-linux-x64.tar.gz > YatsurugiCapture-linux-x64.tar.gz.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: YatsurugiCapture-linux-x64
        path: |
          dist/YatsurugiCapture-linux-x64.tar.gz
          dist/YatsurugiCapture-linux-x64.tar.gz.sha256

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build application
      run: |
        pyinstaller YatsurugiCapture.spec

    - name: Create release package
      run: |
        cd dist
        Compress-Archive -Path YatsurugiCapture.exe -DestinationPath YatsurugiCapture-windows-x64.zip
        Get-FileHash YatsurugiCapture-windows-x64.zip -Algorithm SHA256 | Select-Object Hash | Out-File -FilePath YatsurugiCapture-windows-x64.zip.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: YatsurugiCapture-windows-x64
        path: |
          dist/YatsurugiCapture-windows-x64.zip
          dist/YatsurugiCapture-windows-x64.zip.sha256

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: YatsurugiCapture-linux-x64
        path: ./artifacts/linux

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: YatsurugiCapture-windows-x64
        path: ./artifacts/windows

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/linux/YatsurugiCapture-linux-x64.tar.gz
          ./artifacts/linux/YatsurugiCapture-linux-x64.tar.gz.sha256
          ./artifacts/windows/YatsurugiCapture-windows-x64.zip
          ./artifacts/windows/YatsurugiCapture-windows-x64.zip.sha256
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
