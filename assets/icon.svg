<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="128"
   height="128"
   viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" />

  <!-- Camera body -->
  <rect x="28" y="42" width="72" height="48" rx="4" fill="#ffffff" opacity="0.95" />

  <!-- Lens -->
  <circle cx="56" cy="66" r="18" fill="#2c3e50" />
  <circle cx="56" cy="66" r="14" fill="#34495e" />
  <circle cx="56" cy="66" r="8" fill="#1a252f" />

  <!-- Lens reflection -->
  <ellipse cx="52" cy="62" rx="4" ry="6" fill="#7f8c8d" opacity="0.5" />

  <!-- Viewfinder -->
  <rect x="78" y="50" width="16" height="12" rx="2" fill="#34495e" />

  <!-- Record button (red dot) -->
  <circle cx="86" cy="72" r="5" fill="#e74c3c" />

  <!-- Top details -->
  <rect x="30" y="38" width="12" height="4" rx="2" fill="#bdc3c7" />
  <rect x="78" y="38" width="20" height="4" rx="2" fill="#bdc3c7" />

  <!-- Bottom accent -->
  <path d="M 35 90 Q 64 95 93 90" stroke="#2c3e50" stroke-width="2" fill="none" opacity="0.6" />
</svg>
